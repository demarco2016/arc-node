# Enable persistence backpressure in CI to exercise the feature until it is
# enabled by default.
cl.config.execution_persistence_backpressure = true

# Each validator uses a distinct, visually-distinctive fee recipient so tests
# can tell which validator proposed a given block. Paired with genesis where
# `ProtocolConfig.rewardBeneficiary = 0x0`, this causes the EL to honour each
# validator's `--suggested-fee-recipient`. See `LOCALDEV_FEE_RECIPIENTS` in
# `tests/helpers/networks/localdev.ts` (which mirrors these addresses index-for-index).
[nodes.validator1]
cl_suggested_fee_recipient = "0x1111111111111111111111111111111111111111"

[nodes.validator2]
cl_suggested_fee_recipient = "0x2222222222222222222222222222222222222222"

[nodes.validator3]
cl_suggested_fee_recipient = "0x3333333333333333333333333333333333333333"

[nodes.validator4]
cl_suggested_fee_recipient = "0x4444444444444444444444444444444444444444"

[nodes.validator5]
cl_suggested_fee_recipient = "0x5555555555555555555555555555555555555555"

[nodes.full1]
