# Configuration for cargo audit

[advisories]
# Ignore specific advisories by ID
ignore = [
    # ring 0.16.20 - Some AES functions may panic when overflow checking is enabled
    "RUSTSEC-2025-0009",
    # ring 0.16.20 is unmaintained - waiting for libp2p to update dependencies
    "RUSTSEC-2025-0010",

    # Transitive dependencies from reth/alloy that we cannot update directly:
    # bincode is unmaintained - used by reth-nippy-jar, reth-stages
    "RUSTSEC-2025-0141",
    # derivative is unmaintained - used by various reth crates
    "RUSTSEC-2024-0388",
    # paste is unmaintained - used by alloy-primitives
    "RUSTSEC-2024-0436",
    # rustls-pemfile is unmaintained - used by reqwest via reth
    "RUSTSEC-2025-0134",
    # lru IterMut violates Stacked Borrows - used by discv5, reth-network
    "RUSTSEC-2026-0002",

    # rand 0.8.5 is unsound with a custom logger - no 0.8.x patch available; upgrading
    # to 0.9+ requires a major-version API migration and transitive deps (yamux, libp2p)
    # still require rand 0.8.x
    "RUSTSEC-2026-0097",

    # hickory-proto 0.25.2 - NSEC3 closest-encloser proof unbounded loop; no fixed version
    # available yet. Transitive dependency via reth-dns-discovery (reth v1.11.3) and
    # libp2p-mdns (libp2p 0.56.0) — cannot be updated without bumping reth/libp2p.
    "RUSTSEC-2026-0118",
    # hickory-proto 0.25.2 - O(n²) name compression CPU exhaustion; fix requires >=0.26.1.
    # Transitive dependency via reth-dns-discovery (reth v1.11.3) and libp2p-mdns
    # (libp2p 0.56.0) — both pin hickory-proto to 0.25.x; cannot update without bumping reth.
    "RUSTSEC-2026-0119",
]